<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Talent Bridge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #1e2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        /* ==================== COMPACT NAVBAR ==================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 60px;
            background: var(--dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            height: 68px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logo:hover {
            transform: scale(1.08);
            transition: 0.3s ease;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover:after {
            width: 100%;
        }

        nav a:hover {
            color: var(--accent);
        }

        .btn-signup {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            padding: 10px 26px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
            transition: all 0.4s ease;
            font-size: 1rem;
        }

        .btn-signup:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4);
        }

        /* ==================== POST JOB PAGE STYLING ==================== */
        .post-section {
            padding: 100px 50px 80px;
            background: linear-gradient(180deg, #f8fafc, #f1f5f9);
            min-height: calc(100vh - 68px);
        }

        .post-section h1 {
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card {
            background: white;
            max-width: 820px;
            margin: 0 auto;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.15);
            transition: all 0.4s ease;
        }

        .form-card:hover {
            box-shadow: 0 30px 70px rgba(168, 85, 247, 0.2);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
            font-size: 1.05rem;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 600;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 12px 30px;
                height: auto;
            }
            .post-section {
                padding: 80px 20px;
            }
            .form-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Talent Bridge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="explore_talent.html">Explore Talent</a>
        <a href="post_job.html">Post Job</a>
        <a href="login.html">Login</a>
        <a href="signup.html" class="btn-signup">Sign Up Free</a>
    </nav>
</header>

<section class="post-section">
    <div class="form-header">
        <h1>Post a New Job / Requirement</h1>
        <p>Reach verified performers instantly • Secure &amp; transparent hiring</p>
    </div>

    <div class="form-card">
        <form>
            <label>Event Title</label>
            <input type="text" placeholder="Wedding Reception - Anchor Required" 
                   value="Corporate Launch - Dancer Needed">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <div>
                    <label>Date</label>
                    <input type="date" value="2026-04-15">
                </div>
                <div>
                    <label>Time</label>
                    <input type="time" value="18:00">
                </div>
            </div>

            <label>Budget (₹)</label>
            <input type="text" placeholder="25000" value="35000">

            <label>Role / Skill Required</label>
            <select>
                <option>Dancer</option>
                <option>Singer</option>
                <option>Anchor</option>
                <option>Actor</option>
                <option>Magician</option>
                <option>Comedian</option>
            </select>

            <label>Event Description</label>
            <textarea rows="6">Need an energetic dancer for a 15-minute performance at our corporate launch event in Pune. Theme: Modern Bollywood fusion. Audience: 150+ professionals.</textarea>

            <button type="button" class="btn" onclick="alert('🎉 Job Posted Successfully!\n\nYour requirement has been published and will reach 1,248 verified performers.')">
                Post Job Now
            </button>
        </form>
    </div>
</section>

</body>
</html>
